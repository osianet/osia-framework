services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: osia-qdrant
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /home/ubuntu/osia-qdrant/storage:/qdrant/storage
    restart: always

  redis:
    image: redis:alpine
    container_name: osia-redis
    ports:
      - "6379:6379"
    restart: always

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: osia-signal
    environment:
      - MODE=json-rpc
    ports:
      - "8081:8080"
    volumes:
      - ./signal-data:/home/signalapi/.local/share/signal-cli
    restart: always

  kali-sandbox:
    image: kalilinux/kali-rolling
    container_name: osia-kali
    tty: true
    stdin_open: true
    restart: always
    command: >
      sh -c "apt-get update && 
             apt-get install -y nmap whois dnsutils iputils-ping curl && 
             tail -f /dev/null"
