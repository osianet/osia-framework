services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: osia-qdrant
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /home/ubuntu/osia-qdrant/storage:/qdrant/storage
      - /home/ubuntu/osia-qdrant/snapshots:/qdrant/snapshots
    mem_limit: 6g
    memswap_limit: 7g
    restart: always

  redis:
    image: redis:alpine
    container_name: osia-redis
    ports:
      - "6379:6379"
    restart: always

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: osia-signal
    environment:
      - MODE=json-rpc
    ports:
      - "8081:8080"
    volumes:
      - ./signal-data:/home/.local/share/signal-cli
    restart: always
    labels:
      - "autoheal=true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/accounts | grep -q '\\+' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: osia-autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_START_PERIOD=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  wikijs-db:
    image: postgres:15-alpine
    container_name: osia-wikijs-db
    environment:
      - POSTGRES_DB=wikijs
      - POSTGRES_USER=wikijs
      - POSTGRES_PASSWORD=${WIKIJS_DB_PASSWORD}
    volumes:
      - /home/ubuntu/osia-wikijs/db:/var/lib/postgresql/data
    restart: always

  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: osia-wikijs
    depends_on:
      - wikijs-db
    environment:
      - DB_TYPE=postgres
      - DB_HOST=wikijs-db
      - DB_PORT=5432
      - DB_USER=wikijs
      - DB_PASS=${WIKIJS_DB_PASSWORD}
      - DB_NAME=wikijs
    ports:
      - "127.0.0.1:3000:3000"
    restart: always

  kali-sandbox:
    image: kalilinux/kali-rolling
    container_name: osia-kali
    tty: true
    stdin_open: true
    restart: always
    command: >
      sh -c "apt-get update &&
             apt-get install -y nmap whois dnsutils iputils-ping curl &&
             tail -f /dev/null"

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
