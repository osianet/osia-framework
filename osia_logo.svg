<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Circle -->
    <circle cx="256" cy="256" r="250" fill="#1A202C" stroke="#D4AF37" stroke-width="8"/>
    <circle cx="256" cy="256" r="230" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10,10"/>

    <!-- Stylized Global Network / Eye -->
    <path d="M110 256C110 256 180 140 256 140C332 140 402 256 402 256C402 256 332 372 256 372C180 372 110 256 110 256Z" fill="#2D3748" stroke="#63B3ED" stroke-width="6"/>
    
    <!-- Pupil / Data Core -->
    <circle cx="256" cy="256" r="60" fill="#1A202C" stroke="#D4AF37" stroke-width="4"/>
    <circle cx="256" cy="256" r="30" fill="#63B3ED">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
    </circle>

    <!-- Network Nodes -->
    <circle cx="256" cy="140" r="8" fill="#D4AF37"/>
    <circle cx="256" cy="372" r="8" fill="#D4AF37"/>
    <circle cx="110" cy="256" r="8" fill="#D4AF37"/>
    <circle cx="402" cy="256" r="8" fill="#D4AF37"/>
    
    <!-- Connection Lines -->
    <line x1="256" y1="140" x2="256" y2="196" stroke="#D4AF37" stroke-width="2"/>
    <line x1="256" y1="316" x2="256" y2="372" stroke="#D4AF37" stroke-width="2"/>
    <line x1="110" y1="256" x2="196" y2="256" stroke="#D4AF37" stroke-width="2"/>
    <line x1="316" y1="256" x2="402" y2="256" stroke="#D4AF37" stroke-width="2"/>

    <!-- Text Path -->
    <defs>
        <path id="textCircle" d="M 256, 256 m -180, 0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0" />
    </defs>
    
    <text font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#D4AF37">
        <textPath href="#textCircle" startOffset="25%">OPEN SOURCE INTELLIGENCE AGENCY</textPath>
    </text>
    
    <text x="256" y="440" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#D4AF37" text-anchor="middle">OSIA</text>
