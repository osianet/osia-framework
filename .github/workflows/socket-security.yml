name: Socket Security

on:
  pull_request:
    branches: [main]
  # Also run on pushes to main so merged changes are scanned
  push:
    branches: [main]

jobs:
  socket-scan:
    name: Supply chain scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # allows Socket to post PR comments

    steps:
      - uses: actions/checkout@v4

      - name: Socket Security scan
        uses: SocketDev/socket-security-action@v2
        with:
          api-key: ${{ secrets.SOCKET_SECURITY_API_KEY }}
