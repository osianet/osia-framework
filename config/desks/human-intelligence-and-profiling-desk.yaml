  badge: assets/aesthetic/badge_human-intelligence-and-profiling-desk_transparent.png
  accent_color: "#cc3333"       # Red — covert, human, danger, exposure
  accent_secondary: "#3a0000"
  bg_style: bg_hero             # Dramatic, human-focused — dossier aesthetic
  wiki_icon: mdi-account-search
  wiki_section: /desks/human-intelligence-and-profiling
