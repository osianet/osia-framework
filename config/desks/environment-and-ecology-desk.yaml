slug: environment-and-ecology-desk
code: TERRA
name: "Environment & Ecological Intelligence Desk"
routing_description: "Climate, ecological disasters, extractivism, environmental racism, Indigenous land rights, pollution, resource conflicts, food security, environmental policy."
prompt_file: templates/prompts/environment-and-ecology-desk.txt

model:
  primary:
    provider: openrouter
    model_id: anthropic/claude-sonnet-4-6
    temperature: 0.3
    max_tokens: 4096
  fallback:
    provider: openrouter
    model_id: google/gemini-2.5-flash
    temperature: 0.3
    max_tokens: 4096

qdrant:
  collection: environment-and-ecology-desk
  context_top_k: 5
  cross_desk_search: true
  cross_desk_top_k: 3
  boost_collections:
    - reliefweb-disasters
    - noaa-storm-events
    - epa-toxic-releases
    - wikileaks-cables
    - collection-directorate
    - gdelt-events
  boost_top_k: 3

tools:
  - search_web
  - search_arxiv
  - search_wikipedia

mcp_servers:
  - tavily
  - arxiv
  - wikipedia

entity_research_target: true

aesthetic:
  logo: assets/logos/v2_compass_mycelium_1024_transparent.png   # Compass/mycelium — ecological networks, living systems
  badge: assets/aesthetic/badge_environment-and-ecology-desk_transparent.png
  accent_color: "#00aa44"       # Deep green — ecology, land, living systems
  accent_secondary: "#0c1c0c"
  bg_style: bg_ecological       # Natural/ecological texture
  wiki_icon: mdi-leaf
  wiki_section: /desks/environment-and-ecology
  css_class: desk-ecology

# Weekly briefing voice & persona (ElevenLabs TTS)
briefing:
  voice_id: XB0fDUnXU5powFXDhCwa  # Charlotte — clear, passionate female
  voice_ref_path: config/voice_refs/environment-and-ecology-desk.mp3
  persona: >
    You are Dr. Wren Nakamura, head of Environment & Ecology at OSIA.
    You read environmental data as early warning intelligence — translating
    ecological signals into downstream consequences for food security,
    displacement, resource conflict, and infrastructure stability. You
    recognise ecosystems, rivers, and forests as subjects with inherent
    rights, not commodities. You expose extractivism, environmental racism,
    and the colonial destruction of Indigenous lands. Evidence-driven, with
    an eye for what the data signals before it becomes a crisis.
  portrait_prompt: >
    Professional headshot portrait of Dr. Wren Nakamura, a Japanese-American woman in her
    early 40s, head of Environment and Ecology intelligence. Thoughtful, perceptive expression
    with clear, determined eyes. Shoulder-length dark hair, minimal makeup. Wearing a dark
    olive blazer over a cream blouse. Small silver pendant necklace. Soft directional lighting
    against a dark muted green-black background. Photorealistic, 8k, intelligence agency
    ID photo aesthetic. No text, no words, no watermarks.
