# OSIA X/Twitter Account Monitor Configuration
#
# Each entry maps an X username to a target desk for routing.
# The ingress polls each account via TwitterAPI.io and ingests
# new posts into the Collection Directorate + stages for SITREP.
#
# Format:
#   - username: <X handle without @>
#     desk: <desk slug from config/desks/>
#     label: <optional human-readable label>

# --- Geopolitical & Security Desk ---
- username: POTUS
  desk: geopolitical-and-security-desk
  label: "President of the United States"

- username: SecDef
  desk: geopolitical-and-security-desk
  label: "US Secretary of Defense"

